# claude-statusline configuration
# See https://github.com/nathabonfim59/claude-statusline for docs.

# Theme to use for the status bar colors.
# Built-in themes: default, onedark, monokai, catppuccin, dracula, jetbrains
# You can also create custom themes in ~/.config/claude-statusline/themes/
theme: default

# Context window progress bar thresholds (%).
# warning: bar turns yellow at this percentage
# danger: bar turns red at this percentage
# Override per model using the model ID from Claude Code (e.g. claude-opus-4-7).
thresholds:
  default:
    warning: 50
    danger: 75

# Which blocks to show and in what order.
# Available blocks for line1: model, git, project, version
# Available blocks for line2: bar, percent, cost, time, tokens, rates, diff, hash
# compact: priority order — blocks listed first are kept when the terminal is narrow.
blocks:
  line1: [model, git, project, version]
  line2: [bar, percent, cost, time, tokens, rates, diff, hash]
  compact: [model, bar, percent, cost, git, project, hash, time, tokens, rates, diff, version]
